<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Akiyama Yusuke 的个人主页，展示作品、技能和联系方式。">
    <meta name="theme-color" content="#eff5ff">
    <title>Akiyama Yusuke | Personal Home</title>
    <script>
        (function () {
            if (location.protocol !== 'file:') {
                return;
            }

            const serviceBase = 'http://127.0.0.1:8000';
            const targetUrl = `${serviceBase}/index.html${location.search || ''}${location.hash || ''}`;
            const probe = new Image();
            probe.onload = function () {
                location.replace(targetUrl);
            };
            probe.onerror = function () {
                document.documentElement.setAttribute('data-runtime-mode', 'file-fallback');
            };
            probe.src = `${serviceBase}/favicon.png?probe=20260507c`;
        })();
    </script>

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="css/font-awesome.min.css">
    <link rel="stylesheet" href="css/main.css?v=20260507f">
    <link rel="stylesheet" href="css/original-circle-gallery.css?v=20260507o">
    <link rel="stylesheet" href="css/original-tarot.css?v=20260507j">
</head>
<body>
    <canvas class="particle-trail" id="particleTrail" aria-hidden="true"></canvas>
    <canvas class="trail-overlay" id="trailOverlay" aria-hidden="true"></canvas>
    <canvas class="magic-trail" id="magicTrail" aria-hidden="true"></canvas>
    <button type="button" class="settings-trigger" id="settingsTrigger" aria-controls="settingsDrawer" aria-expanded="false" aria-label="打开设置">
        <i class="fa fa-chevron-right settings-trigger__arrow" aria-hidden="true"></i>
        <i class="fa fa-cog settings-trigger__gear" aria-hidden="true"></i>
    </button>
    <aside class="settings-drawer" id="settingsDrawer" aria-hidden="true">
        <div class="settings-drawer__panel">
            <div class="settings-drawer__head">
                <div>
                    <p class="eyebrow">Settings</p>
                    <h2>页面设置</h2>
                </div>
                <button type="button" class="settings-drawer__close" id="settingsClose" aria-label="关闭设置">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div class="settings-drawer__content" id="settingsContent"></div>
        </div>
    </aside>
    <div class="page-shell">
        <div class="orb orb-pink"></div>
        <div class="orb orb-blue"></div>

        <aside class="sidebar glass-panel">
            <a class="brand" href="https://github.com/AkiyamaYusuke/" target="_blank" rel="noopener noreferrer" aria-label="打开 GitHub 主页">
                <img src="https://avatars.githubusercontent.com/u/79816362?v=4" alt="GitHub 头像" class="brand-avatar" id="brandAvatar">
                <span class="brand-copy">
                    <strong id="brandName">AkiyamaYusuke</strong>
                </span>
            </a>

            <nav class="sidebar-nav" aria-label="主导航">
                <a href="#home" class="nav-link is-active">
                    <i class="fa fa-home"></i>
                    <span>首页</span>
                </a>
                <a href="#portfolio" class="nav-link">
                    <i class="fa fa-play-circle"></i>
                    <span>作品</span>
                </a>
                <a href="#about" class="nav-link">
                    <i class="fa fa-diamond"></i>
                    <span>能力</span>
                </a>
                <a href="#contact" class="nav-link">
                    <i class="fa fa-envelope"></i>
                    <span>联系</span>
                </a>
            </nav>

            <div class="sidebar-actions">
                <a class="topbar-action" href="#contact">合作咨询</a>
                <a class="sidebar-ghost" href="#portfolio">进入作品墙</a>
            </div>
        </aside>

        <main class="content-stage">
            <section id="home" class="home-stage stage-panel">
                <div class="home-scene reveal">
                    <div class="home-backdrop tilt-card">
                        <div class="home-cover-layer" id="homeCoverLayer" aria-hidden="true"></div>
                        <div class="background-effects-layer" id="backgroundEffectsLayer" aria-hidden="true"></div>
                        <div class="background-overlay"></div>
                        <div class="home-copy">
                            <h2>清晰、顺滑、带有舞台感的个人主页。</h2>

                            <div class="home-actions">
                                <a class="btn btn-primary ripple" href="#portfolio">看作品</a>
                                <a class="btn btn-secondary ripple" href="#about">看能力</a>
                            </div>
                        </div>
                    </div>

                    <div class="home-meta-row">
                        <a class="glass-card profile-card tilt-card profile-link" href="https://github.com/AkiyamaYusuke/" target="_blank" rel="noopener noreferrer" aria-label="打开 GitHub 主页">
                            <img src="https://avatars.githubusercontent.com/u/79816362?v=4" alt="GitHub 头像" class="profile-image" id="profileAvatar">
                            <div>
                                <p class="profile-status"><span></span> Available for collaboration</p>
                                <h2 id="profileName">AkiyamaYusuke</h2>
                            </div>
                        </a>

                        <div class="home-metrics" id="homeMetrics"></div>
                    </div>
                </div>
            </section>

            <section class="section stage-panel">
                <div class="section-head reveal">
                    <div>
                        <h2>一眼看懂我能做什么</h2>
                    </div>
                </div>
                <div class="stats-grid" id="statsGrid"></div>
            </section>

            <section id="portfolio" class="section stage-panel">
                <div class="section-head reveal">
                    <div>
                        <h2>精选作品</h2>
                    </div>
                </div>

                <div class="filter-bar reveal" id="projectFilters" aria-label="作品筛选"></div>
                <div class="projects-grid" id="projectGrid"></div>
            </section>

            <section id="about" class="section stage-panel">
                <div class="section-head reveal">
                    <div>
                        <h2>能力与经历</h2>
                    </div>
                </div>

                <div class="split-grid">
                    <article class="glass-card reveal tilt-card">
                        <h3>技术重点</h3>
                        <div class="skills-list" id="skillsList"></div>
                    </article>

                    <article class="glass-card reveal tilt-card">
                        <h3>成长路径</h3>
                        <div class="timeline" id="timelineList"></div>
                    </article>
                </div>
            </section>

            <section id="contact" class="section stage-panel">
                <div class="section-head reveal">
                    <div>
                        <h2>联系我</h2>
                    </div>
                </div>

                <div class="contact-grid">
                    <article class="glass-card reveal tilt-card">
                        <h3>联系渠道</h3>
                        <div class="contact-list" id="contactList"></div>
                    </article>

                    <article class="glass-card reveal tilt-card">
                        <h3>快速入口</h3>
                        <div class="cta-stack">
                            <a class="btn btn-primary ripple" href="mailto:pymeia@163.com">发邮件</a>
                            <a class="btn btn-secondary ripple" href="https://github.com/AkiyamaYusuke/" target="_blank" rel="noopener noreferrer">看 GitHub</a>
                        </div>
                    </article>
                </div>
            </section>

            <footer class="footer">
                <span>© <span id="year"></span> <span id="footerName">Akiyama Yusuke</span></span>
                <span>Built for a cleaner, smoother personal home.</span>
            </footer>
        </main>
    </div>

    <section class="live2d-dock" id="live2dDock" aria-label="Live2D 角色">
        <div class="live2d-scale-popover" id="live2dScalePopover">
            <span>角色大小</span>
            <input type="range" id="dockScale" min="0.65" max="1.45" step="0.05" value="1">
        </div>
        <div class="live2d-stage" id="dockHandle">
            <iframe
                id="live2dFrame"
                class="live2d-frame"
                title="Live2D 角色"
                loading="eager"
                referrerpolicy="no-referrer"
            ></iframe>
            <div class="live2d-fallback" id="live2dFallback">
                <div class="fallback-orb"></div>
                <div class="fallback-face">
                    <span></span>
                    <span></span>
                    <i></i>
                </div>
            </div>
            <canvas id="live2dCanvas" class="live2d-canvas" aria-hidden="true"></canvas>
        </div>
    </section>

    <script src="js/effects/particle-primitives.js?v=20260507b"></script>
    <script src="js/effects/particle-network-effect.js?v=20260507b"></script>
    <script src="js/effects/trail-ripple-effect.js?v=20260507b"></script>
    <script src="js/effects/click-sigil-effect.js?v=20260507b"></script>
    <script src="js/effects/jellyfish-background-effect.js?v=20260507b"></script>
    <script src="js/effects/vendor/rainyday.js?v=20260507b"></script>
    <script src="js/effects/rain-glass-background-effect.js?v=20260507b"></script>
    <script src="js/config/runtime-path-resolver.js?v=20260507b"></script>
    <script src="js/config/generated-site-data.js?v=20260507b"></script>
    <script src="js/data/site-data-loader.js?v=20260507b"></script>
    <script src="js/settings/site-settings-store.js?v=20260507b"></script>
    <script src="js/settings/home-settings-config.js?v=20260507d"></script>
    <script src="js/settings/settings-drawer.js?v=20260507d"></script>
    <script src="js/features/portfolio-layout-controller.js?v=20260507k"></script>
    <script src="js/features/tarot-feature.js?v=20260507j"></script>
    <script src="js/background/background-effects-controller.js?v=20260507b"></script>
    <script src="js/live2d/live2d-dock-controller.js?v=20260507b"></script>
    <script src="js/main.js?v=20260507d"></script>
</body>
</html>
